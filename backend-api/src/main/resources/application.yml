spring:
  datasource:
    # XAMPP-friendly defaults for local development on Windows.
    # Override DB_URL / DB_USERNAME / DB_PASSWORD env vars for other environments.
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/healthcare_bd?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        # Map Java Instant <-> MySQL TIMESTAMP correctly
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: false
    validate-on-migrate: false

server:
  port: 8080
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-change-this-secret-key-32b}
    access-expiration-minutes: 60
    refresh-expiration-days: 7
  demo-otp:
    enabled: ${DEMO_OTP_ENABLED:true}
    master-code: ${DEMO_OTP_MASTER_CODE:123456}
