openapi: 3.0.3
info:
  title: Bangladesh Healthcare Platform API
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /api/v1/auth/login:
    post:
      summary: User login
      requestBody:
        required: true
      responses:
        '200':
          description: Login successful
  /api/v1/auth/register:
    post:
      summary: Register new user account
      responses:
        '200':
          description: Registered
  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      responses:
        '200':
          description: Refreshed
  /api/v1/donors:
    get:
      summary: List donors
      responses:
        '200':
          description: OK
    post:
      summary: Create donor
      responses:
        '200':
          description: Created
  /api/v1/blood-requests:
    get:
      summary: List blood requests
      responses:
        '200':
          description: OK
    post:
      summary: Create blood request (guest allowed)
      responses:
        '200':
          description: Created
  /api/v1/premium/check:
    get:
      summary: Check feature access gate (guest vs premium)
      parameters:
        - in: query
          name: feature
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Access decision
  /api/v1/join/{entityType}:
    post:
      summary: Join premium provider module (requires auth, admin approval)
      parameters:
        - in: path
          name: entityType
          required: true
          schema:
            type: string
        - in: query
          name: entityId
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: role
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Approval request created
  /api/v1/approvals/{id}/approve:
    put:
      summary: Approve join request
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Approved
  /api/v1/hospitals:
    get:
      summary: List hospitals
      responses:
        '200':
          description: OK
  /api/v1/doctors:
    get:
      summary: List doctors
      responses:
        '200':
          description: OK
  /api/v1/ambulances:
    get:
      summary: List ambulances
      responses:
        '200':
          description: OK
  /api/v1/pharmacies:
    get:
      summary: List pharmacies
      responses:
        '200':
          description: OK
  /api/v1/diagnostics:
    get:
      summary: List diagnostic centers
      responses:
        '200':
          description: OK
  /api/v1/telemedicine:
    get:
      summary: List telemedicine sessions
      responses:
        '200':
          description: OK
  /api/v1/reminders:
    get:
      summary: List medicine reminders
      responses:
        '200':
          description: OK
  /api/v1/health-records:
    get:
      summary: List digital health records
      responses:
        '200':
          description: OK
